apiVersion: apps/v1
kind: Deployment
metadata:
  name: running-deployment
  labels:
    app: running
spec:
  replicas: 2
  selector:
    matchLabels:
      app: running
  template:
    metadata:
      labels:
        app: running
    spec:
      containers:
      - name: running-container
        image: adil5800/running:v1   # your Docker Hub image
        ports:
        - containerPort: 80

---
 apiVersion: v1
 kind: Service
 metadata:
   name: running-service
 spec:
   type: ClusterIP
   selector:
     app: running
   ports:
   - port: 80
     targetPort: 80


